<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>10-Emerald</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
  <style>
    :root {
      --emerald: #10b981;
      --emerald-dark: #059669;
      --emerald-glow: rgba(16,185,129,0.15);
      --navy: #0a0f1e;
      --navy-mid: #111827;
      --navy-light: #1f2937;
      --border: rgba(16,185,129,0.2);
      --text: #f0fdf4;
      --muted: #6b7280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2.5rem;
      background: rgba(10,15,30,0.95);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--emerald); letter-spacing: 0.05em; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--emerald); }

    .hero { text-align: center; padding: 4rem 2rem 3rem; position: relative; overflow: hidden; }
    .hero::before {
      content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 500px; height: 300px;
      background: radial-gradient(ellipse, var(--emerald-glow), transparent 70%);
      pointer-events: none;
    }
    .hero-label { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--emerald); margin-bottom: 0.75rem; font-weight: 600; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 0.75rem; }
    .hero p { color: var(--muted); font-size: 0.95rem; }

    .form-section { max-width: 680px; margin: 0 auto 3rem; padding: 0 1.5rem; }
    .card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; }
    .card h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--emerald); margin-bottom: 1.25rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .input-row.single { grid-template-columns: 1fr; }
    input {
      width: 100%; padding: 0.7rem 1rem;
      background: var(--navy-light); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--emerald); }
    .btn-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    button {
      flex: 1; padding: 0.75rem; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: var(--emerald); color: #fff; }
    .btn-primary:hover { background: var(--emerald-dark); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--emerald); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--emerald-glow); }
    .error-msg { font-size: 0.8rem; color: #ef4444; min-height: 1.2rem; margin-top: 0.4rem; }

    .list-section { max-width: 680px; margin: 0 auto 4rem; padding: 0 1.5rem; }
    #classmate-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .classmate-item {
      background: var(--navy-mid); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .classmate-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--emerald-glow); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      color: var(--emerald); flex-shrink: 0;
    }
    .classmate-info { flex: 1; }
    .classmate-name { font-weight: 600; font-size: 0.95rem; }
    .classmate-detail { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.9rem; }
    .count-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--emerald-glow); border: 1px solid var(--border);
      border-radius: 999px; padding: 0.3rem 0.9rem;
      font-size: 0.8rem; color: var(--emerald); font-weight: 600; margin-bottom: 1rem;
    }

    footer { text-align: center; padding: 1.5rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">10-Emerald</div>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Classmates</a></li>
    <li><a href="page2.html">Attendance</a></li>
    <li><a href="page3.html">Gallery</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-label">SY 2025–2026</div>
  <h1>Grade 10 Classmates</h1>
  <p>Add and view your classmates easily</p>
</div>

<div class="form-section">
  <div class="card">
    <h2>Add a Classmate</h2>
    <div class="input-row">
      <input type="text" id="input-name"    placeholder="Full Name" />
      <input type="text" id="input-section" placeholder="Section (e.g. Emerald)" />
    </div>
    <div class="input-row single">
      <input type="text" id="input-subject" placeholder="Favorite Subject" />
    </div>
    <div class="btn-row">
      <button class="btn-primary"   id="btn-add">Add Classmate</button>
      <button class="btn-secondary" id="btn-show">Show List</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<div class="list-section">
  <div id="list-header" style="display:none; margin-bottom:0.75rem;">
    <span class="count-badge">
      <span>●</span>
      <span id="count-text">0 classmates</span>
    </span>
  </div>
  <div id="classmate-list">
    <div class="empty-state">No classmates added yet. Add one above!</div>
  </div>
</div>

<footer>© 2025–2026 10-Emerald. All rights reserved.</footer>


<script>
  function ls_get(key) { return localStorage.getItem(key) || ""; }
  function ls_set(key, val) { localStorage.setItem(key, val); }
</script>

<script type="py">
import json
from pyscript import document, window

class Classmate:
    def __init__(self, name, section, favorite_subject):
        self.name             = name
        self.section          = section
        self.favorite_subject = favorite_subject

    def get_greeting(self):
        return f"Hi! I am {self.name} from {self.section}. My favorite subject is {self.favorite_subject}."

    def get_initials(self):
        parts    = self.name.split(" ")
        initials = ""
        for part in parts[:2]:
            if part:
                initials += part[0].upper()
        return initials

    def to_dict(self):
        return {
            "name":             self.name,
            "section":          self.section,
            "favorite_subject": self.favorite_subject
        }

    def render_card(self):
        return f"""
        <div class="classmate-item">
            <div class="classmate-avatar">{self.get_initials()}</div>
            <div class="classmate-info">
                <div class="classmate-name">{self.name}</div>
                <div class="classmate-detail">{self.get_greeting()}</div>
            </div>
        </div>
        """


classmates   = []
list_visible = False
STORAGE_KEY  = "emerald_classmates"


def load_from_storage():
    raw = window.ls_get(STORAGE_KEY)

    if raw:
        entries = json.loads(raw)
        for entry in entries:
            c = Classmate(
                entry["name"],
                entry["section"],
                entry["favorite_subject"]
            )
            classmates.append(c)


def save_to_storage():
    data = [c.to_dict() for c in classmates]
    window.ls_set(STORAGE_KEY, json.dumps(data))


def render_list():
    container  = document.getElementById("classmate-list")
    header     = document.getElementById("list-header")
    count_text = document.getElementById("count-text")

    if len(classmates) == 0:
        container.innerHTML  = '<div class="empty-state">No classmates added yet. Add one above!</div>'
        header.style.display = "none"
        return

    count = len(classmates)
    label = "classmate" if count == 1 else "classmates"
    count_text.textContent   = f"{count} {label}"
    header.style.display     = "block"

    html_output = ""
    for classmate in classmates:
        html_output += classmate.render_card()

    container.innerHTML = html_output


def add_classmate(event):
    name    = document.getElementById("input-name").value.strip()
    section = document.getElementById("input-section").value.strip()
    subject = document.getElementById("input-subject").value.strip()
    error   = document.getElementById("error-msg")

    if not name or not section or not subject:
        error.textContent = "Please fill in all fields."
        return

    error.textContent = ""

    new_classmate = Classmate(name, section, subject)
    classmates.append(new_classmate)
    save_to_storage()

    document.getElementById("input-name").value    = ""
    document.getElementById("input-section").value = ""
    document.getElementById("input-subject").value = ""

    if list_visible:
        render_list()


def show_list(event):
    global list_visible
    list_visible = True
    render_list()


document.getElementById("btn-add").addEventListener("click",  add_classmate)
document.getElementById("btn-show").addEventListener("click", show_list)

load_from_storage()
</script>

</body>
</html>
